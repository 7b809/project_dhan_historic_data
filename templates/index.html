<!DOCTYPE html>
<html>
<head>
    <title>Dhan Login</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            margin-top: 100px;
        }
        .box {
            background: white;
            padding: 30px;
            display: inline-block;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        input {
            padding: 10px;
            width: 200px;
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Dhan TOTP Login</h2>

    <form method="POST">
        <input type="text" name="totp" placeholder="Enter 6-digit TOTP" required />
        <br>
        <button type="submit">Generate Token</button>
    </form>

    {% if message %}
        <p class="{{ status_class }}">{{ message }}</p>
    {% endif %}

</div>

</body>
</html>
