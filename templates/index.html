{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="box text-center">

            <h3>Dhan TOTP Login</h3>

            <form method="POST">
                <input type="text"
                       name="totp"
                       class="form-control mb-3"
                       placeholder="Enter 6-digit TOTP"
                       required>

                <button type="submit" class="btn btn-primary w-100">
                    Generate Token
                </button>
            </form>

            {% if message %}
                <p class="mt-3 {{ status_class }}">
                    {{ message }}
                </p>
            {% endif %}

        </div>
    </div>
</div>

{% endblock %}
